<!doctype html>

<html lang="en" xml:lang="en" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <title>Personnel</title>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Progressive web app to build army lists for Warhammer 40k and Age of Sigmar"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="canonical" href="https://personnel.facerix.com/" />
    <meta property="og:title" content="Personnel" />
    <meta
      property="og:description"
      content="Progressive web app to build army lists for Warhammer 40k and Age of Sigmar"
    />
    <meta property="og:url" content="https://personnel.facerix.com/" />
    <meta property="og:type" content="website" />

    <link rel="icon" href="/icons/icon512_maskable.png" type="image/png" />
    <link rel="mask-icon" href="/hero.svg" color="#ffffff" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" sizes="192x192" />

    <link rel="stylesheet" href="/main.css" type="text/css" charset="utf-8" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="modulepreload" href="./40k.js" />

    <style>
      header.top {
        background-color: #274764;
        color: white;

        img {
          filter: invert(1);
          height: 30px;
        }

        .actions {
          display: flex;
          margin-left: auto;

          button {
            border-color: transparent;
            padding: 0.25em;
            margin-left: 0.5em;
          }
        }
      }

      .faction-selector {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      a.btn,
      button.btn {
        padding: 0.5rem 0;
        border: none;
        background: transparent;
        cursor: pointer;

        img {
          height: 1.5rem;
        }
      }

      main {
        hr {
          width: 100%;
        }

        .saved-lists {
          display: flex;
          flex: 1 1 auto;
          flex-wrap: wrap;
          gap: 0.5rem;
          justify-content: flex-start;
          flex-direction: column;
          align-content: center;
          align-items: stretch;
        }

        .list-slug {
          display: inline-flex;
          align-items: center;
          height: fit-content;
          gap: 0.25rem;

          border: 2px double #274764;
          border-radius: 4px;
          padding: 0.25rem 1rem;

          img.faction {
            height: 2.5rem;
            width: 3rem;
            margin-right: 0.5rem;
          }

          .name-and-points {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;

            .points {
              font-size: 0.75rem;
              color: #909090;
              transition: opacity 250ms allow-discrete;
              height: 1rem; /* to prevent layout shift when the points are added */

              &:empty {
                opacity: 0;
              }
            }
          }

          span.actions {
            display: flex;
            gap: 0.5rem;
            margin-left: 0.5rem;
          }

          &:hover {
            border-color: #950817;
            border-style: solid;
          }
        }

        &.loading {
          .saved-lists {
            display: none;
            opacity: 0;
          }

          .loader {
            height: 100px;
            display: block;
            opacity: 1;
          }
        }

        .loader {
          display: none;
          opacity: 0;
          transition: opacity 250ms allow-discrete;
        }
      }

      @media (min-width: 768px) {
        header > h1 {
          margin-right: 130px;
        }
      }

      #btnNew {
        anchor-name: --anc;
      }

      [popover]:popover-open {
        opacity: 1;
        height: fit-content;
      }

      [popover] {
        /* Final state of the exit animation */
        opacity: 0;
        height: 0;

        position-anchor: --anc;
        top: anchor(end);
        right: anchor(end);
        border: none;
        margin: 0;
        padding: 0;
        transition-property: opacity, transform, overlay, display, height;
        transition-duration: 0.25s;
        transition-behavior: allow-discrete;
      }

      /* Needs to be included after the previous [popover]:popover-open 
        rule to take effect, as the specificity is the same */
      @starting-style {
        [popover]:popover-open {
          opacity: 0;
          height: 0;
        }
      }
    </style>
  </head>

  <body class="u-fill-height">
    <header class="top">
      <a href="/">
        <img src="/images/back.svg" alt="back arrow" />
      </a>
      <img src="/images/aquila.svg" alt="Warhammer logo" />
      <h1>40k Lists</h1>
      <span class="actions">
        <a class="btn" href="/40k/metadata" title="Manage metadata for armies">
          <img src="/images/db.svg" alt="database icon" />
        </a>
      </span>
    </header>
    <main class="u-center loading">
      <nav id="factionMenu">
        <button type="button" id="btnNew" popovertarget="faction-mega-menu">New list ▼</button>
        <div id="faction-mega-menu" popover>
          <mega-menu></mega-menu>
        </div>
      </nav>

      <hr />
      <h5>Saved lists</h5>
      <img src="/images/40k-dots.svg" alt="loading indicator" class="loader" />
      <div class="saved-lists"></div>
    </main>

    <footer id="main-foot">A&nbsp;<a href="/about.html">Facerix</a>&nbsp;creation</footer>

    <update-notification></update-notification>
  </body>
  <script src="./40k.js" type="module"></script>
</html>
