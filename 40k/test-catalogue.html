<!doctype html>
<html>
  <head>
    <title>Test BattleScribe Catalogue Parser</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      #entryParseDebug {
        width: 100%;
        max-width: 100vw;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 10px;

        section {
          flex: 1;
        }
        textarea {
          width: 100%;
          height: 200px;
        }

        #entryResults {
          font-family: monospace;
        }
      }
      #status {
        margin: 20px 0;
        padding: 10px;
        border-radius: 4px;
      }
      .success {
        background-color: #d4edda;
        color: #155724;
      }
      .error {
        background-color: #f8d7da;
        color: #721c24;
      }
      .info {
        background-color: #d1ecf1;
        color: #0c5460;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        margin: 10px 5px;
      }
      pre {
        background: #f4f4f4;
        padding: 15px;
        border-radius: 4px;
        overflow-x: auto;
        max-height: 400px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <h1>BattleScribe Catalogue Parser Test</h1>

    <div id="entryParseDebug">
      <section>
        <label for="entryText">Entry XML</label><br />
        <textarea id="entryText"></textarea>
      </section>
      <button id="parseEntryBtn">Parse entry &gt;&gt;</button>
      <section>
        <label for="entryResults">Parse Results</label><br />
        <textarea id="entryResults" readonly></textarea>
      </section>
    </div>

    <div>
      <input type="file" id="catalogueFile" accept=".cat,.xml" />
      <button id="loadAndParseBtn">Load & Parse Catalogue</button>
      <input type="checkbox" id="simplifyOutput" checked />
      <label for="simplifyOutput">Simplify Output</label>
    </div>

    <div id="status"></div>

    <div id="results"></div>
    <div id="rawResults"></div>

    <script type="module" src="test-catalogue.js"></script>
  </body>
</html>
