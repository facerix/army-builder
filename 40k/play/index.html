<!doctype html>

<html lang="en" xml:lang="en" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <title>Personnel: View 40k list</title>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Progressive web app to build army lists for Warhammer 40k and Age of Sigmar"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="canonical" href="https://personnel.facerix.com/" />
    <meta property="og:title" content="Personnel" />
    <meta
      property="og:description"
      content="Progressive web app to build army lists for Warhammer 40k and Age of Sigmar"
    />
    <meta property="og:url" content="https://personnel.facerix.com/" />
    <meta property="og:type" content="website" />

    <link rel="icon" href="/icons/icon512_maskable.png" type="image/png" />
    <link rel="mask-icon" href="/hero.svg" color="#ffffff" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" sizes="192x192" />

    <link rel="stylesheet" href="/main.css" type="text/css" charset="utf-8" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="modulepreload" href="./40k-play.js" />

    <style>
      header.top {
        background-color: #274764;
        color: white;

        img {
          filter: invert(1);
          height: 30px;
        }

        .actions {
          display: flex;
          margin-left: auto;

          button {
            border-color: transparent;
            padding: 0.25em;
            margin-left: 0.5em;
          }
        }
      }

      body {
        .loader {
          height: 0;
          opacity: 0;
        }

        &.loading {
          main {
            height: 0;
            opacity: 0;
          }

          .loader {
            height: 200px;
            opacity: 1;
            transition: all 250ms ease-out;
          }
        }
      }

      main {
        display: flex;
        flex-direction: row;
        gap: 1rem;
      }

      aside {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;

        flex: 0 0 200px;
        height: auto;

        select {
          margin-top: 1rem;
          flex: 1 1 auto;
          width: fit-content;
          padding: 0.25rem;
          font-size: 1.1rem;
        }
      }

      section.datacards-container {
        flex: 1 1 auto;
        border-left: 1px solid #ccc;
        padding-left: 0.5rem;
      }

      p.warning {
        background-color: #950817;
        color: white;
        border-radius: 0.5rem;
        font-style: italic;
        padding: 0.5rem;
        margin: 0.5rem 0;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        align-items: center;
      }

      #btnEditMetadata {
        border: 1px solid #f3e6e6;
        border-radius: 0.5rem;
        padding: 0.35rem 0.75rem;
        background: #f3e6e6;
        color: #5a0910;
        font-weight: 600;
        cursor: pointer;
      }

      #btnEditMetadata:hover,
      #btnEditMetadata:focus-visible {
        outline: 2px solid #f3e6e6;
        outline-offset: 2px;
      }

      #btnEditMetadata:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .u-hidden {
        display: none;
      }
    </style>
  </head>

  <body class="u-fill-height loading">
    <header class="top">
      <a href="/40k">
        <img src="/images/back.svg" alt="back arrow" />
      </a>
      <img src="/images/aquila.svg" alt="Warhammer logo" />
      <h1>40k Army Datacards</h1>
      <span class="actions">
        <a class="btn" id="btnMetadata" title="Manage metadata for army's units">
          <img src="/images/db.svg" alt="database icon" />
        </a>
      </span>
    </header>
    <img src="/images/40k-gear-spinner.svg" alt="spinning gear placeholder" class="loader" />
    <main>
      <aside id="armyMetadata">
        <div id="armyName"></div>
        <div id="detachment"></div>
        <div id="totalPoints"></div>
        <select id="unitNames" size="10"></select>
      </aside>
      <section class="datacards-container">
        <p class="warning u-hidden">
          Missing some or all data for this unit; have you uploaded the datacard data for this
          faction?
          <button id="btnEditMetadata" type="button">Add datacard metadata</button>
        </p>
        <data-card></data-card>
      </section>
    </main>

    <update-notification></update-notification>
    <metadata-modal></metadata-modal>
  </body>
  <script src="40k-play.js" type="module"></script>
</html>
